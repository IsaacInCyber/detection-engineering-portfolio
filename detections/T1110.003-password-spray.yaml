# Password Spray Detection
# MITRE ATT&CK: T1110.003 - Password Spraying
# Author: Isaac Amoussou-Kpakpa
# Created: 2026-04

title: Password Spray Detection
id: t1110.003-password-spray
status: experimental
description: |
  Detects password spray attacks where an attacker tries a single password
  against multiple accounts from different source IPs to avoid lockout thresholds.
  Triggers when 20+ unique IPs fail authentication to the same host within 1 hour.

references:
  - https://attack.mitre.org/techniques/T1110/003/

tags:
  - attack.credential_access
  - attack.t1110.003

logsource:
  product: microsoft_defender_endpoint
  service: DeviceLogonEvents

detection:
  query: |
    let Threshold = 20;
    DeviceLogonEvents
    | where Timestamp >= ago(12h)
    | where ActionType == "LogonFailed"
    | summarize UniqueIPs = dcount(RemoteIP), IPsToInvestigate = make_set(RemoteIP),
                TotalFailures = count() by DeviceName, bin(Timestamp, 1h)
    | where UniqueIPs >= Threshold
    | order by TotalFailures desc

  threshold: 20
  timeframe: 1h

falsepositives:
  - VPN or proxy servers aggregating traffic from multiple users
  - Shared NAT environments
  - Load balancers with multiple backend IPs

level: high

simulation:
  tool: Hydra
  command: hydra -L users.txt -p Password123 rdp://target
  platform: Parrot Security OS
  notes: Use wordlist of common usernames against single password
